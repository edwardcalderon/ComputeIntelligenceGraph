version: "3.9"

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  cig-network:
    driver: bridge
    name: cig-network

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  neo4j-data:
    name: cig-neo4j-data
  neo4j-logs:
    name: cig-neo4j-logs
  chroma-data:
    name: cig-chroma-data

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Neo4j Graph Database ───────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: cig-neo4j
    restart: unless-stopped
    networks:
      - cig-network
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/cigpassword}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1.5G
          cpus: '0.5'

  # ── Chroma Vector Database ─────────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:0.5.0
    container_name: cig-chroma
    restart: unless-stopped
    networks:
      - cig-network
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # ── API Service ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
      target: production
    image: docker.io/cigtechnology/cig-api:latest
    container_name: cig-api
    restart: unless-stopped
    networks:
      - cig-network
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-cigpassword}
      CHROMA_URL: http://chroma:8000
    depends_on:
      neo4j:
        condition: service_healthy
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # ── Cartography Discovery Service ─────────────────────────────────────────
  cartography:
    build:
      context: .
      dockerfile: services/cartography/Dockerfile
    image: docker.io/cigtechnology/cig-cartography:latest
    container_name: cig-cartography
    restart: unless-stopped
    networks:
      - cig-network
    ports:
      - "8001:8001"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-cigpassword}
      AWS_ROLE_ARN: ${AWS_ROLE_ARN:-}
      AWS_REGION: ${AWS_REGION:-us-east-2}
      GCP_ENABLED: ${GCP_ENABLED:-false}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      KUBERNETES_ENABLED: ${KUBERNETES_ENABLED:-false}
      KUBECONFIG: ${KUBECONFIG:-}
      KUBERNETES_CLUSTER_NAME: ${KUBERNETES_CLUSTER_NAME:-}
      DISCOVERY_INTERVAL_MINUTES: ${DISCOVERY_INTERVAL_MINUTES:-5}
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${HOME}/.kube:/root/.kube:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # ── Discovery Service ──────────────────────────────────────────────────────
  discovery:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.discovery
      target: production
    image: docker.io/cigtechnology/cig-discovery:latest
    container_name: cig-discovery
    restart: unless-stopped
    networks:
      - cig-network
    environment:
      NODE_ENV: production
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-cigpassword}
      AWS_REGION: ${AWS_REGION:-us-east-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      neo4j:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # ── Chatbot Service ────────────────────────────────────────────────────────
  chatbot:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.chatbot
      target: production
    image: docker.io/cigtechnology/cig-chatbot:latest
    container_name: cig-chatbot
    restart: unless-stopped
    networks:
      - cig-network
    environment:
      NODE_ENV: production
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-cigpassword}
      CHROMA_URL: http://chroma:8000
      CHROMA_HOST: ${CHROMA_HOST:-api.trychroma.com}
      CHROMA_API_KEY: ${CHROMA_API_KEY:-}
      CHROMA_TENANT: ${CHROMA_TENANT:-}
      CHROMA_DATABASE: ${CHROMA_DATABASE:-cig}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      neo4j:
        condition: service_healthy
      chroma:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # ── Dashboard (Next.js) ────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dashboard
      target: production
    image: docker.io/cigtechnology/cig-dashboard:latest
    container_name: cig-dashboard
    restart: unless-stopped
    networks:
      - cig-network
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
