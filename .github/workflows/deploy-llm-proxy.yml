name: Deploy LLM Proxy -> llm-proxy.cig.technology

on:
  push:
    tags:
      - 'llm-proxy-v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Validate deployment without applying changes'
        type: boolean
        default: false

concurrency:
  group: deploy-llm-proxy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
  LLM_PROXY_DOMAIN: ${{ vars.LLM_PROXY_DOMAIN || 'llm-proxy.cig.technology' }}
  LLM_PROXY_IMAGE_REPOSITORY: ${{ vars.LLM_PROXY_IMAGE_REPOSITORY || 'llm-proxy-production' }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || 'cigtechnology' }}
  DOCKERHUB_LLM_PROXY_IMAGE: ${{ vars.DOCKERHUB_LLM_PROXY_IMAGE || 'llm-proxy' }}
  LLM_PROXY_HOSTED_ZONE_DOMAIN: ${{ vars.LLM_PROXY_HOSTED_ZONE_DOMAIN || 'cig.technology' }}
  INFRA_APP_NAME: ${{ vars.INFRA_APP_NAME || 'llm-proxy' }}
  INFRA_PIPELINE_REPO: ${{ vars.INFRA_PIPELINE_REPO || 'edwardcalderon/ComputeIntelligenceGraph' }}
  INFRA_PIPELINE_PREFIX: ${{ vars.INFRA_PIPELINE_PREFIX || 'llm-proxy' }}
  INFRA_PROJECT_TAG: ${{ vars.INFRA_PROJECT_TAG || 'llm-proxy' }}
  INFRA_PIPELINE_BRANCH_PROD: ${{ vars.INFRA_PIPELINE_BRANCH_PROD || 'main' }}
  INFRA_PIPELINE_PERMISSIONS_MODE: ${{ vars.INFRA_PIPELINE_PERMISSIONS_MODE || 'admin' }}
  TF_IN_AUTOMATION: 'true'

jobs:
  detect-llm-proxy-impact:
    name: Detect LLM Proxy impact
    runs-on: ubuntu-latest
    outputs:
      llm_proxy_source_changed: ${{ steps.detect.outputs.llm_proxy_source_changed }}
      llm_proxy_runtime_changed: ${{ steps.detect.outputs.llm_proxy_runtime_changed }}
      has_relevant_changes: ${{ steps.detect.outputs.has_relevant_changes }}
      llm_proxy_source_tag: ${{ steps.detect.outputs.llm_proxy_source_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Detect LLM Proxy impact
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BASE="$(git rev-parse "${GITHUB_SHA}^" 2>/dev/null || true)"
            if [[ -z "$BASE" ]]; then
              BASE="$(git hash-object -t tree /dev/null)"
            fi
            node scripts/detect-llm-proxy-impact.mjs --base "$BASE" --head "$GITHUB_SHA"
          else
            node scripts/detect-llm-proxy-impact.mjs --head "$GITHUB_SHA"
          fi

  validate:
    name: Validate LLM Proxy deployment
    runs-on: ubuntu-latest
    needs: detect-llm-proxy-impact
    if: ${{ github.event_name == 'push' && needs.detect-llm-proxy-impact.outputs.has_relevant_changes == 'true' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and test LLM Proxy
        if: ${{ needs.detect-llm-proxy-impact.outputs.llm_proxy_source_changed == 'true' }}
        run: |
          pnpm --filter @llm-proxy/app lint
          pnpm --filter @llm-proxy/app test

      - name: Build LLM Proxy
        if: ${{ needs.detect-llm-proxy-impact.outputs.llm_proxy_source_changed == 'true' }}
        run: pnpm --filter @llm-proxy/app build

  build-image:
    name: Build LLM Proxy Docker image
    runs-on: ubuntu-latest
    needs: [detect-llm-proxy-impact, validate]
    if: ${{ always() && needs.detect-llm-proxy-impact.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.detect-llm-proxy-impact.outputs.has_relevant_changes == 'true') && (needs.validate.result == 'success' || needs.validate.result == 'skipped') }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image_uri: ${{ steps.finalize.outputs.image_uri }}
      image_digest: ${{ steps.finalize.outputs.image_digest }}
      source_tag: ${{ steps.finalize.outputs.source_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Resolve repository URI
        id: meta
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REPOSITORY_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${LLM_PROXY_IMAGE_REPOSITORY}"
          DOCKERHUB_IMAGE="${DOCKERHUB_USERNAME}/${DOCKERHUB_LLM_PROXY_IMAGE}"
          SOURCE_TAG="${{ github.ref_name }}"
          SHA_TAG="sha-${GITHUB_SHA::7}"

          echo "repository_uri=$REPOSITORY_URI" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=$DOCKERHUB_IMAGE" >> "$GITHUB_OUTPUT"
          echo "source_tag=$SOURCE_TAG" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repository exists
        shell: bash
        run: |
          if ! aws ecr describe-repositories --repository-names "$LLM_PROXY_IMAGE_REPOSITORY" >/dev/null 2>&1; then
            aws ecr create-repository \
              --repository-name "$LLM_PROXY_IMAGE_REPOSITORY" \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability MUTABLE >/dev/null
          fi

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/llm-proxy/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.repository_uri }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.repository_uri }}:${{ steps.meta.outputs.source_tag }}
            ${{ steps.meta.outputs.dockerhub_image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.dockerhub_image }}:${{ steps.meta.outputs.source_tag }}
          cache-from: |
            type=registry,ref=${{ steps.meta.outputs.repository_uri }}:buildcache
            type=gha
          cache-to: type=registry,ref=${{ steps.meta.outputs.repository_uri }}:buildcache,mode=max
          provenance: false

      - name: Finalize resolved image
        id: finalize
        shell: bash
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          IMAGE_URI="${{ steps.meta.outputs.repository_uri }}@$DIGEST"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "image_digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "source_tag=${{ steps.meta.outputs.source_tag }}" >> "$GITHUB_OUTPUT"

      - name: Summarize built image
        run: |
          echo "### LLM Proxy image build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source tag | \`${{ steps.finalize.outputs.source_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ECR image | \`${{ steps.finalize.outputs.image_uri }}\` |" >> "$GITHUB_STEP_SUMMARY"

  provision-base-infrastructure:
    name: Provision base LLM Proxy infrastructure
    runs-on: ubuntu-latest
    needs: [detect-llm-proxy-impact, build-image]
    if: ${{ github.event.inputs.dry_run != 'true' && needs.detect-llm-proxy-impact.result == 'success' && needs.build-image.result == 'success' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Provision base infrastructure
        working-directory: packages/llm-proxy
        env:
          LLM_PROXY_IMAGE_URI: ${{ needs.build-image.outputs.image_uri }}
          LLM_PROXY_DOMAIN: ${{ env.LLM_PROXY_DOMAIN }}
          LLM_PROXY_HOSTED_ZONE_DOMAIN: ${{ env.LLM_PROXY_HOSTED_ZONE_DOMAIN }}
        run: pnpm exec sst deploy --stage production --yes

  smoke-test:
    name: Smoke test LLM Proxy
    runs-on: ubuntu-latest
    needs: [provision-base-infrastructure]
    if: ${{ needs.provision-base-infrastructure.result == 'success' }}
    permissions:
      contents: read
    steps:
      - name: Wait for deployment stabilization
        run: sleep 20

      - name: Health check
        run: |
          curl --fail --show-error --silent "https://${LLM_PROXY_DOMAIN}/health" >/tmp/llm-proxy-health.json
          cat /tmp/llm-proxy-health.json

      - name: Models endpoint check
        run: |
          curl --fail --show-error --silent "https://${LLM_PROXY_DOMAIN}/v1/models" >/tmp/llm-proxy-models.json
          cat /tmp/llm-proxy-models.json

  deployment-summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: ${{ always() && needs.smoke-test.result == 'success' }}
    permissions:
      contents: read
    steps:
      - name: Generate deployment summary
        run: |
          echo "### LLM Proxy Deployment Complete ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Deployment Details:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Domain**: https://${{ env.LLM_PROXY_DOMAIN }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Region**: ${{ env.AWS_REGION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag**: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Available Endpoints:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Health: \`GET /health\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Models: \`GET /v1/models\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Chat Completions: \`POST /v1/chat/completions\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Text Completions: \`POST /v1/completions\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Admin: \`GET /admin/sessions\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- MCP Tools: \`GET /mcp/tools\`" >> "$GITHUB_STEP_SUMMARY"
