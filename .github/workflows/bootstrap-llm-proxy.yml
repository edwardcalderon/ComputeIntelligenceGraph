name: Bootstrap LLM Proxy infrastructure

on:
  workflow_dispatch:
    inputs:
      create_pipelines:
        description: 'Create AWS CodePipeline for continuous deployment'
        type: boolean
        default: false

concurrency:
  group: bootstrap-llm-proxy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
  LLM_PROXY_DOMAIN: ${{ vars.LLM_PROXY_DOMAIN || 'llm-proxy.cig.technology' }}
  LLM_PROXY_IMAGE_REPOSITORY: ${{ vars.LLM_PROXY_IMAGE_REPOSITORY || 'llm-proxy-production' }}
  INFRA_APP_NAME: ${{ vars.INFRA_APP_NAME || 'llm-proxy' }}
  INFRA_PIPELINE_REPO: ${{ vars.INFRA_PIPELINE_REPO || 'edwardcalderon/ComputeIntelligenceGraph' }}
  INFRA_PIPELINE_PREFIX: ${{ vars.INFRA_PIPELINE_PREFIX || 'llm-proxy' }}
  INFRA_PROJECT_TAG: ${{ vars.INFRA_PROJECT_TAG || 'llm-proxy' }}
  INFRA_PIPELINE_BRANCH_PROD: ${{ vars.INFRA_PIPELINE_BRANCH_PROD || 'main' }}
  INFRA_PIPELINE_PERMISSIONS_MODE: ${{ vars.INFRA_PIPELINE_PERMISSIONS_MODE || 'admin' }}
  TF_IN_AUTOMATION: 'true'

jobs:
  bootstrap:
    name: Bootstrap LLM Proxy base infrastructure
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Create S3 bucket for SST state
        shell: bash
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="llm-proxy-sst-state-${ACCOUNT_ID}-${AWS_REGION}"

          if aws s3 ls "s3://$BUCKET_NAME" 2>/dev/null; then
            echo "S3 bucket already exists: $BUCKET_NAME"
          else
            echo "Creating S3 bucket: $BUCKET_NAME"
            aws s3 mb "s3://$BUCKET_NAME" --region "$AWS_REGION"
            
            # Enable versioning
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET_NAME" \
              --versioning-configuration Status=Enabled
            
            # Block public access
            aws s3api put-public-access-block \
              --bucket "$BUCKET_NAME" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            
            echo "S3 bucket created and configured: $BUCKET_NAME"
          fi

      - name: Create DynamoDB table for SST state
        shell: bash
        run: |
          TABLE_NAME="llm-proxy-sst-state"

          if aws dynamodb describe-table --table-name "$TABLE_NAME" --region "$AWS_REGION" 2>/dev/null; then
            echo "DynamoDB table already exists: $TABLE_NAME"
          else
            echo "Creating DynamoDB table: $TABLE_NAME"
            aws dynamodb create-table \
              --table-name "$TABLE_NAME" \
              --attribute-definitions \
                AttributeName=id,AttributeType=S \
              --key-schema \
                AttributeName=id,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"
            
            # Wait for table to be created
            aws dynamodb wait table-exists --table-name "$TABLE_NAME" --region "$AWS_REGION"
            echo "DynamoDB table created: $TABLE_NAME"
          fi

      - name: Bootstrap LLM Proxy infrastructure through SST
        working-directory: packages/llm-proxy
        env:
          INFRA_LLM_PROXY_BOOTSTRAP_ONLY: 'true'
          INFRA_CREATE_PIPELINES: ${{ github.event.inputs.create_pipelines || 'false' }}
          API_IMAGE_URI: public.ecr.aws/docker/library/node:22-alpine
        run: pnpm exec sst deploy --stage production --yes

      - name: Generate bootstrap summary
        run: |
          echo "### LLM Proxy Bootstrap Complete ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Infrastructure Created:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- SQS Queues: llm-proxy-request-queue, llm-proxy-response-queue, llm-proxy-dlq" >> "$GITHUB_STEP_SUMMARY"
          echo "- DynamoDB Table: llm-proxy-state" >> "$GITHUB_STEP_SUMMARY"
          echo "- Lambda Function: llm-proxy-lambda" >> "$GITHUB_STEP_SUMMARY"
          echo "- API Gateway: llm-proxy-api" >> "$GITHUB_STEP_SUMMARY"
          echo "- IAM Roles: llm-proxy-lambda-role, llm-proxy-worker-user" >> "$GITHUB_STEP_SUMMARY"
          echo "- SNS Topic: llm-proxy-alerts" >> "$GITHUB_STEP_SUMMARY"
          echo "- CloudWatch Alarms: 3 alarms configured" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Next Steps:**" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Create a GitHub release with tag: \`llm-proxy-v1.0.0\`" >> "$GITHUB_STEP_SUMMARY"
          echo "2. The deployment pipeline will automatically build and deploy the LLM Proxy" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Access the service at: https://${{ env.LLM_PROXY_DOMAIN }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Documentation:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Deployment Guide](.github/LLMPROXY_DEPLOYMENT_GUIDE.md)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Design Document](.kiro/specs/aws-native-llm-proxy/design.md)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Requirements](.kiro/specs/aws-native-llm-proxy/requirements.md)" >> "$GITHUB_STEP_SUMMARY"
