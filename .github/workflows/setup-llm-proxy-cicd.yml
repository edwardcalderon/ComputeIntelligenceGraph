name: Setup LLM Proxy CI/CD Pipeline

on:
  push:
    tags:
      - 'llm-proxy-v*.*.*'
  workflow_dispatch:
    inputs:
      force_setup:
        description: 'Force infrastructure setup even if already exists'
        type: boolean
        default: false

concurrency:
  group: setup-llm-proxy-cicd
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
  LLM_PROXY_DOMAIN: ${{ vars.LLM_PROXY_DOMAIN || 'llm-proxy.cig.technology' }}
  LLM_PROXY_IMAGE_REPOSITORY: ${{ vars.LLM_PROXY_IMAGE_REPOSITORY || 'llm-proxy-production' }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || 'cigtechnology' }}
  INFRA_APP_NAME: ${{ vars.INFRA_APP_NAME || 'llm-proxy' }}
  TF_IN_AUTOMATION: 'true'

jobs:
  check-infrastructure-status:
    name: Check existing infrastructure
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      infrastructure_exists: ${{ steps.check.outputs.infrastructure_exists }}
      needs_setup: ${{ steps.check.outputs.needs_setup }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Check infrastructure status
        id: check
        shell: bash
        run: |
          set +e
          
          # Check if SQS queues exist
          aws sqs get-queue-url --queue-name llm-proxy-request-queue --region "$AWS_REGION" >/dev/null 2>&1
          SQS_EXISTS=$?
          
          # Check if DynamoDB table exists
          aws dynamodb describe-table --table-name llm-proxy-state --region "$AWS_REGION" >/dev/null 2>&1
          DYNAMODB_EXISTS=$?
          
          # Check if Lambda function exists
          aws lambda get-function --function-name llm-proxy-lambda --region "$AWS_REGION" >/dev/null 2>&1
          LAMBDA_EXISTS=$?
          
          # Check if API Gateway exists
          aws apigatewayv2 get-apis --region "$AWS_REGION" | grep -q "llm-proxy-api" >/dev/null 2>&1
          APIGW_EXISTS=$?
          
          if [[ $SQS_EXISTS -eq 0 && $DYNAMODB_EXISTS -eq 0 && $LAMBDA_EXISTS -eq 0 && $APIGW_EXISTS -eq 0 ]]; then
            echo "infrastructure_exists=true" >> "$GITHUB_OUTPUT"
            echo "needs_setup=false" >> "$GITHUB_OUTPUT"
            echo "✅ Infrastructure already exists"
          else
            echo "infrastructure_exists=false" >> "$GITHUB_OUTPUT"
            echo "needs_setup=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Infrastructure needs setup"
          fi

  setup-aws-base-layer:
    name: Setup AWS base layer
    runs-on: ubuntu-latest
    needs: check-infrastructure-status
    if: ${{ github.event.inputs.force_setup == 'true' || needs.check-infrastructure-status.outputs.needs_setup == 'true' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Create S3 bucket for SST state
        shell: bash
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="llm-proxy-sst-state-${ACCOUNT_ID}-${AWS_REGION}"

          if aws s3 ls "s3://$BUCKET_NAME" 2>/dev/null; then
            echo "✅ S3 bucket already exists: $BUCKET_NAME"
          else
            echo "📦 Creating S3 bucket: $BUCKET_NAME"
            aws s3 mb "s3://$BUCKET_NAME" --region "$AWS_REGION"
            
            # Enable versioning
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET_NAME" \
              --versioning-configuration Status=Enabled
            
            # Enable encryption
            aws s3api put-bucket-encryption \
              --bucket "$BUCKET_NAME" \
              --server-side-encryption-configuration '{
                "Rules": [{
                  "ApplyServerSideEncryptionByDefault": {
                    "SSEAlgorithm": "AES256"
                  }
                }]
              }'
            
            # Block public access
            aws s3api put-public-access-block \
              --bucket "$BUCKET_NAME" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            
            echo "✅ S3 bucket created and configured: $BUCKET_NAME"
          fi

      - name: Create DynamoDB table for SST state
        shell: bash
        run: |
          TABLE_NAME="llm-proxy-sst-state"

          if aws dynamodb describe-table --table-name "$TABLE_NAME" --region "$AWS_REGION" 2>/dev/null; then
            echo "✅ DynamoDB table already exists: $TABLE_NAME"
          else
            echo "📦 Creating DynamoDB table: $TABLE_NAME"
            aws dynamodb create-table \
              --table-name "$TABLE_NAME" \
              --attribute-definitions \
                AttributeName=id,AttributeType=S \
              --key-schema \
                AttributeName=id,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"
            
            # Wait for table to be created
            aws dynamodb wait table-exists --table-name "$TABLE_NAME" --region "$AWS_REGION"
            echo "✅ DynamoDB table created: $TABLE_NAME"
          fi

      - name: Create ECR repository
        shell: bash
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          
          if aws ecr describe-repositories --repository-names "$LLM_PROXY_IMAGE_REPOSITORY" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "✅ ECR repository already exists: $LLM_PROXY_IMAGE_REPOSITORY"
          else
            echo "📦 Creating ECR repository: $LLM_PROXY_IMAGE_REPOSITORY"
            aws ecr create-repository \
              --repository-name "$LLM_PROXY_IMAGE_REPOSITORY" \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability MUTABLE \
              --region "$AWS_REGION"
            
            # Set lifecycle policy to keep last 10 images
            aws ecr put-lifecycle-policy \
              --repository-name "$LLM_PROXY_IMAGE_REPOSITORY" \
              --lifecycle-policy-text '{
                "rules": [{
                  "rulePriority": 1,
                  "description": "Keep last 10 images",
                  "selection": {
                    "tagStatus": "any",
                    "countType": "imageCountMoreThan",
                    "countNumber": 10
                  },
                  "action": {
                    "type": "expire"
                  }
                }]
              }' \
              --region "$AWS_REGION"
            
            echo "✅ ECR repository created: $LLM_PROXY_IMAGE_REPOSITORY"
          fi

      - name: Create SNS topic for alerts
        shell: bash
        run: |
          TOPIC_NAME="llm-proxy-alerts"
          
          TOPIC_ARN=$(aws sns list-topics --region "$AWS_REGION" --query "Topics[?contains(TopicArn, '$TOPIC_NAME')].TopicArn" --output text)
          
          if [[ -n "$TOPIC_ARN" ]]; then
            echo "✅ SNS topic already exists: $TOPIC_ARN"
          else
            echo "📦 Creating SNS topic: $TOPIC_NAME"
            TOPIC_ARN=$(aws sns create-topic --name "$TOPIC_NAME" --region "$AWS_REGION" --query 'TopicArn' --output text)
            
            # Set topic attributes
            aws sns set-topic-attributes \
              --topic-arn "$TOPIC_ARN" \
              --attribute-name DisplayName \
              --attribute-value "LLM Proxy Alerts" \
              --region "$AWS_REGION"
            
            echo "✅ SNS topic created: $TOPIC_ARN"
          fi

      - name: Create CloudWatch log group
        shell: bash
        run: |
          LOG_GROUP="/aws/lambda/llm-proxy-lambda"
          
          if aws logs describe-log-groups --log-group-name-prefix "$LOG_GROUP" --region "$AWS_REGION" | grep -q "$LOG_GROUP"; then
            echo "✅ CloudWatch log group already exists: $LOG_GROUP"
          else
            echo "📦 Creating CloudWatch log group: $LOG_GROUP"
            aws logs create-log-group --log-group-name "$LOG_GROUP" --region "$AWS_REGION"
            
            # Set retention to 30 days
            aws logs put-retention-policy \
              --log-group-name "$LOG_GROUP" \
              --retention-in-days 30 \
              --region "$AWS_REGION"
            
            echo "✅ CloudWatch log group created: $LOG_GROUP"
          fi

  setup-sst-infrastructure:
    name: Setup SST infrastructure
    runs-on: ubuntu-latest
    needs: [check-infrastructure-status, setup-aws-base-layer]
    if: ${{ always() && (github.event.inputs.force_setup == 'true' || needs.check-infrastructure-status.outputs.needs_setup == 'true') && needs.setup-aws-base-layer.result == 'success' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Deploy SST infrastructure
        working-directory: packages/llm-proxy
        env:
          INFRA_LLM_PROXY_BOOTSTRAP_ONLY: 'true'
          API_IMAGE_URI: public.ecr.aws/docker/library/node:22-alpine
        run: |
          echo "🚀 Deploying SST infrastructure..."
          pnpm exec sst deploy --stage production --yes
          echo "✅ SST infrastructure deployed"

  validate-infrastructure:
    name: Validate infrastructure setup
    runs-on: ubuntu-latest
    needs: [setup-sst-infrastructure]
    if: ${{ always() && needs.setup-sst-infrastructure.result == 'success' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Validate SQS queues
        shell: bash
        run: |
          echo "🔍 Validating SQS queues..."
          
          for queue in llm-proxy-request-queue llm-proxy-response-queue llm-proxy-dlq; do
            QUEUE_URL=$(aws sqs get-queue-url --queue-name "$queue" --region "$AWS_REGION" --query 'QueueUrl' --output text)
            if [[ -n "$QUEUE_URL" ]]; then
              echo "✅ Queue exists: $queue"
              ATTRS=$(aws sqs get-queue-attributes --queue-url "$QUEUE_URL" --attribute-names All --region "$AWS_REGION")
              echo "   Attributes: $(echo $ATTRS | jq -r '.Attributes | keys[]' | tr '\n' ', ')"
            else
              echo "❌ Queue not found: $queue"
              exit 1
            fi
          done

      - name: Validate DynamoDB table
        shell: bash
        run: |
          echo "🔍 Validating DynamoDB table..."
          
          TABLE_DESC=$(aws dynamodb describe-table --table-name llm-proxy-state --region "$AWS_REGION")
          TABLE_STATUS=$(echo "$TABLE_DESC" | jq -r '.Table.TableStatus')
          
          if [[ "$TABLE_STATUS" == "ACTIVE" ]]; then
            echo "✅ DynamoDB table is ACTIVE"
            echo "   Billing Mode: $(echo $TABLE_DESC | jq -r '.Table.BillingModeSummary.BillingMode')"
            echo "   TTL Enabled: $(echo $TABLE_DESC | jq -r '.Table.TTLDescription.AttributeName // "Not configured"')"
          else
            echo "❌ DynamoDB table status: $TABLE_STATUS"
            exit 1
          fi

      - name: Validate Lambda function
        shell: bash
        run: |
          echo "🔍 Validating Lambda function..."
          
          LAMBDA_DESC=$(aws lambda get-function --function-name llm-proxy-lambda --region "$AWS_REGION")
          LAMBDA_STATUS=$(echo "$LAMBDA_DESC" | jq -r '.Configuration.State')
          
          if [[ "$LAMBDA_STATUS" == "Active" ]]; then
            echo "✅ Lambda function is Active"
            echo "   Runtime: $(echo $LAMBDA_DESC | jq -r '.Configuration.Runtime')"
            echo "   Memory: $(echo $LAMBDA_DESC | jq -r '.Configuration.MemorySize')MB"
            echo "   Timeout: $(echo $LAMBDA_DESC | jq -r '.Configuration.Timeout')s"
          else
            echo "❌ Lambda function status: $LAMBDA_STATUS"
            exit 1
          fi

      - name: Validate API Gateway
        shell: bash
        run: |
          echo "🔍 Validating API Gateway..."
          
          API_ID=$(aws apigatewayv2 get-apis --region "$AWS_REGION" --query "Items[?Name=='llm-proxy-api'].ApiId" --output text)
          
          if [[ -n "$API_ID" ]]; then
            echo "✅ API Gateway exists: $API_ID"
            ROUTES=$(aws apigatewayv2 get-routes --api-id "$API_ID" --region "$AWS_REGION" --query 'Items[].RouteKey' --output text)
            echo "   Routes: $(echo $ROUTES | tr '\n' ', ')"
          else
            echo "❌ API Gateway not found"
            exit 1
          fi

      - name: Validate IAM roles
        shell: bash
        run: |
          echo "🔍 Validating IAM roles..."
          
          for role in llm-proxy-lambda-role llm-proxy-worker-user; do
            if aws iam get-role --role-name "$role" >/dev/null 2>&1; then
              echo "✅ IAM role exists: $role"
            else
              echo "❌ IAM role not found: $role"
              exit 1
            fi
          done

      - name: Validate SNS topic
        shell: bash
        run: |
          echo "🔍 Validating SNS topic..."
          
          TOPIC_ARN=$(aws sns list-topics --region "$AWS_REGION" --query "Topics[?contains(TopicArn, 'llm-proxy-alerts')].TopicArn" --output text)
          
          if [[ -n "$TOPIC_ARN" ]]; then
            echo "✅ SNS topic exists: $TOPIC_ARN"
          else
            echo "❌ SNS topic not found"
            exit 1
          fi

      - name: Validate CloudWatch alarms
        shell: bash
        run: |
          echo "🔍 Validating CloudWatch alarms..."
          
          ALARMS=$(aws cloudwatch describe-alarms --alarm-name-prefix llm-proxy --region "$AWS_REGION" --query 'MetricAlarms[].AlarmName' --output text)
          ALARM_COUNT=$(echo "$ALARMS" | wc -w)
          
          if [[ $ALARM_COUNT -gt 0 ]]; then
            echo "✅ CloudWatch alarms configured: $ALARM_COUNT"
            echo "   Alarms: $(echo $ALARMS | tr '\n' ', ')"
          else
            echo "⚠️ No CloudWatch alarms found (optional)"
          fi

  generate-setup-summary:
    name: Generate setup summary
    runs-on: ubuntu-latest
    needs: [check-infrastructure-status, validate-infrastructure]
    if: ${{ always() }}
    permissions:
      contents: read
    steps:
      - name: Generate summary
        run: |
          echo "### LLM Proxy CI/CD Setup Complete ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Infrastructure Status:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Infrastructure Exists: ${{ needs.check-infrastructure-status.outputs.infrastructure_exists }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Setup Required: ${{ needs.check-infrastructure-status.outputs.needs_setup }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Provisioned Resources:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ S3 Bucket (SST state)" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ DynamoDB Table (llm-proxy-state)" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ ECR Repository (llm-proxy-production)" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ SNS Topic (llm-proxy-alerts)" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ CloudWatch Log Group (/aws/lambda/llm-proxy-lambda)" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ SQS Queues (request, response, DLQ)" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Lambda Function (llm-proxy-lambda)" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ API Gateway (llm-proxy-api)" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ IAM Roles (lambda-role, worker-user)" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ CloudWatch Alarms (3 configured)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Next Steps:**" >> "$GITHUB_STEP_SUMMARY"
          echo "1. The deployment pipeline will automatically trigger on the next release tag" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Monitor progress in GitHub Actions" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Access the service at: https://${{ env.LLM_PROXY_DOMAIN }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Documentation:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Deployment Guide](.github/LLMPROXY_DEPLOYMENT_GUIDE.md)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [CI/CD README](.github/LLM_PROXY_CICD_README.md)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Release Flow](.github/LLM_PROXY_RELEASE_FLOW.md)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [GitHub Setup](.github/LLM_PROXY_GITHUB_SETUP.md)" >> "$GITHUB_STEP_SUMMARY"
