name: Publish Docker image bundle

on:
  push:
    tags:
      - 'v*.*.*'
      - 'cli-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'CLI version to publish images for (defaults to packages/cli/package.json)'
        required: false
        type: string
      dry_run:
        description: 'Build and validate without pushing or publishing the manifest'
        required: false
        type: boolean
        default: false
      rebuild_all:
        description: 'Force rebuilding every image in the bundle'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || 'cigtechnology' }}

jobs:
  prepare:
    name: Resolve bundle version and scope
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      source_sha: ${{ steps.meta.outputs.source_sha }}
      previous_release_tag: ${{ steps.meta.outputs.previous_release_tag }}
      build_services_json: ${{ steps.meta.outputs.build_services_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Resolve version and affected services
        id: meta
        shell: bash
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
          REBUILD_ALL: ${{ github.event.inputs.rebuild_all }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import { execSync } from 'node:child_process';
          import { findHighestReleaseTagBelow } from './scripts/release-version.mjs';

          const outputPath = process.env.GITHUB_OUTPUT;
          const head = process.env.GITHUB_SHA;
          const versionInput = String(process.env.VERSION_INPUT || '').trim();
          const rebuildAll = String(process.env.REBUILD_ALL || '').toLowerCase() === 'true';
          const refType = process.env.GITHUB_REF_TYPE || '';
          const refName = process.env.GITHUB_REF_NAME || '';

          const packageVersion = JSON.parse(fs.readFileSync('./packages/cli/package.json', 'utf8')).version;
          const version =
            versionInput ||
            (refType === 'tag' && refName.startsWith('cli-v') ? refName.slice('cli-v'.length) : packageVersion);
          const releaseTag = `cli-v${version}`;

          function appendOutput(key, value) {
            fs.appendFileSync(outputPath, `${key}=${value}\n`);
          }

          function appendMultilineOutput(key, value) {
            fs.appendFileSync(outputPath, `${key}<<EOF\n${value}\nEOF\n`);
          }

          function listTags() {
            try {
              return execSync("git tag --list 'cli-v*.*.*' --sort=-v:refname", { encoding: 'utf8' })
                .split('\n')
                .map((tag) => tag.trim())
                .filter(Boolean);
            } catch {
              return [];
            }
          }

          function readJsonAtRef(ref, filePath) {
            try {
              return JSON.parse(execSync(`git show ${ref}:${filePath}`, { encoding: 'utf8', stdio: ['ignore', 'pipe', 'pipe'] }));
            } catch {
              return null;
            }
          }

          function isVersionOnlyPackageJson(filePath, previousReleaseTag) {
            if (!filePath.endsWith('package.json') || !previousReleaseTag) {
              return false;
            }

            const baseJson = readJsonAtRef(previousReleaseTag, filePath);
            const headJson = readJsonAtRef(head, filePath);
            if (!baseJson || !headJson) {
              return false;
            }

            const baseClone = structuredClone(baseJson);
            const headClone = structuredClone(headJson);
            delete baseClone.version;
            delete headClone.version;

            return (
              JSON.stringify(baseClone) === JSON.stringify(headClone) &&
              baseJson.version !== headJson.version
            );
          }

          const previousReleaseTag = findHighestReleaseTagBelow(listTags(), releaseTag, 'cli-v');

          const changedFiles = rebuildAll || !previousReleaseTag
            ? execSync('git ls-files', { encoding: 'utf8' })
                .split('\n')
                .map((entry) => entry.trim())
                .filter(Boolean)
            : execSync(`git diff --name-only ${previousReleaseTag}...${head}`, { encoding: 'utf8' })
                .split('\n')
                .map((entry) => entry.trim())
                .filter(Boolean);

          const services = new Set();
          const mark = (...names) => names.forEach((name) => services.add(name));
          const markNodeServices = () => mark('api', 'dashboard', 'dashboard-selfhosted', 'discovery', 'chatbot');

          for (const filePath of changedFiles) {
            if (filePath === 'release-metadata.json') {
              continue;
            }

            if (isVersionOnlyPackageJson(filePath, previousReleaseTag)) {
              continue;
            }

            if (
              filePath === 'package.json' ||
              filePath === 'pnpm-lock.yaml' ||
              filePath === 'pnpm-workspace.yaml' ||
              filePath === 'turbo.json' ||
              filePath === 'tsconfig.base.json'
            ) {
              markNodeServices();
              continue;
            }

            if (
              filePath.startsWith('infra/docker/Dockerfile.api') ||
              filePath.startsWith('packages/api/') ||
              filePath.startsWith('packages/auth/') ||
              filePath.startsWith('packages/config/') ||
              filePath.startsWith('packages/graph/') ||
              filePath.startsWith('packages/discovery/') ||
              filePath.startsWith('packages/emails/src/templates/')
            ) {
              mark('api');
            }

            if (
              filePath.startsWith('infra/docker/Dockerfile.dashboard') ||
              filePath.startsWith('apps/dashboard/') ||
              filePath.startsWith('packages/auth/') ||
              filePath.startsWith('packages/ui/') ||
              filePath.startsWith('packages/i18n/') ||
              filePath.startsWith('packages/sdk/')
            ) {
              mark('dashboard', 'dashboard-selfhosted');
            }

            if (
              filePath.startsWith('infra/docker/Dockerfile.discovery') ||
              filePath.startsWith('packages/discovery/') ||
              filePath.startsWith('packages/config/') ||
              filePath.startsWith('packages/graph/')
            ) {
              mark('discovery');
            }

            if (filePath.startsWith('services/cartography/')) {
              mark('cartography');
            }

            if (
              filePath.startsWith('infra/docker/Dockerfile.chatbot') ||
              filePath.startsWith('packages/chatbot/') ||
              filePath.startsWith('packages/config/') ||
              filePath.startsWith('packages/graph/')
            ) {
              mark('chatbot');
            }
          }

          const orderedServices = ['api', 'dashboard', 'dashboard-selfhosted', 'discovery', 'cartography', 'chatbot'];
          const buildServices = previousReleaseTag
            ? orderedServices.filter((service) => services.has(service))
            : orderedServices;

          if (!buildServices.includes('cartography')) {
            // Cartography does not have a stable upstream bundle source in this release flow,
            // so always build it from the repository Dockerfile to keep the bundle self-contained.
            buildServices.push('cartography');
          }

          appendOutput('version', version);
          appendOutput('release_tag', releaseTag);
          appendOutput('source_sha', head);
          appendOutput('previous_release_tag', previousReleaseTag);
          appendMultilineOutput('build_services_json', JSON.stringify(buildServices));
          NODE

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.build_services_json != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.build_services_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' || github.event.inputs.dry_run != 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image configuration
        id: image
        shell: bash
        run: |
          case "${{ matrix.service }}" in
            api)
              {
                echo 'image_name=cig-api'
                echo 'dockerfile=infra/docker/Dockerfile.api'
                echo 'context=.'
                echo 'build_args<<EOF'
                echo
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
              ;;
            dashboard)
              {
                echo 'image_name=cig-dashboard'
                echo 'dockerfile=infra/docker/Dockerfile.dashboard'
                echo 'context=.'
                echo 'build_args<<EOF'
                echo "NEXT_PUBLIC_API_URL=https://api.cig.technology"
                echo "NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://cig.lat' }}"
                echo "NEXT_PUBLIC_DASHBOARD_URL=${{ vars.NEXT_PUBLIC_DASHBOARD_URL || 'https://app.cig.lat' }}"
                echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
                echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
                echo "NEXT_PUBLIC_AUTHENTIK_URL=${{ vars.NEXT_PUBLIC_AUTHENTIK_URL || 'https://auth.cig.technology' }}"
                echo "NEXT_PUBLIC_AUTHENTIK_CLIENT_ID=${{ vars.NEXT_PUBLIC_AUTHENTIK_CLIENT_ID }}"
                echo "NEXT_PUBLIC_APP_VERSION=${{ needs.prepare.outputs.version }}"
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
              ;;
            dashboard-selfhosted)
              {
                echo 'image_name=cig-dashboard-selfhosted'
                echo 'dockerfile=infra/docker/Dockerfile.dashboard'
                echo 'context=.'
                echo 'build_args<<EOF'
                echo "NEXT_PUBLIC_API_URL=http://localhost:3003"
                echo "NEXT_PUBLIC_SITE_URL=http://localhost:3000"
                echo "NEXT_PUBLIC_DASHBOARD_URL=http://localhost:3001"
                echo "NEXT_PUBLIC_AUTHENTIK_URL=${{ vars.NEXT_PUBLIC_AUTHENTIK_URL || 'https://auth.cig.technology' }}"
                echo "NEXT_PUBLIC_AUTHENTIK_CLIENT_ID=${{ vars.NEXT_PUBLIC_AUTHENTIK_CLIENT_ID }}"
                echo "NEXT_PUBLIC_APP_VERSION=${{ needs.prepare.outputs.version }}"
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
              ;;
            discovery)
              {
                echo 'image_name=cig-discovery'
                echo 'dockerfile=infra/docker/Dockerfile.discovery'
                echo 'context=.'
                echo 'build_args<<EOF'
                echo
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
              ;;
            cartography)
              {
                echo 'image_name=cig-cartography'
                echo 'dockerfile=services/cartography/Dockerfile'
                echo 'context=services/cartography'
                echo 'build_args<<EOF'
                echo
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
              ;;
            chatbot)
              {
                echo 'image_name=cig-chatbot'
                echo 'dockerfile=infra/docker/Dockerfile.chatbot'
                echo 'context=.'
                echo 'build_args<<EOF'
                echo
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported service: ${{ matrix.service }}" >&2
              exit 1
              ;;
          esac

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.image.outputs.context }}
          file: ${{ steps.image.outputs.dockerfile }}
          push: ${{ github.event_name == 'push' || github.event.inputs.dry_run != 'true' }}
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/${{ steps.image.outputs.image_name }}:${{ needs.prepare.outputs.version }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/${{ steps.image.outputs.image_name }}:sha-${{ github.sha }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/${{ steps.image.outputs.image_name }}:latest
          build-args: ${{ steps.image.outputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Write manifest fragment
        if: ${{ github.event_name == 'push' || github.event.inputs.dry_run != 'true' }}
        shell: bash
        run: |
          mkdir -p artifacts
          IMAGE_REF="docker.io/${{ env.DOCKERHUB_USERNAME }}/${{ steps.image.outputs.image_name }}"
          jq -n \
            --arg service "${{ matrix.service }}" \
            --arg image "${IMAGE_REF}@${{ steps.build.outputs.digest }}" \
            --arg version "${{ needs.prepare.outputs.version }}" \
            --arg release_tag "${{ needs.prepare.outputs.release_tag }}" \
            --arg source_sha "${{ needs.prepare.outputs.source_sha }}" \
            '{service: $service, image: $image, version: $version, release_tag: $release_tag, source_sha: $source_sha}' \
            > "artifacts/${{ matrix.service }}.json"

      - name: Upload manifest fragment
        if: ${{ github.event_name == 'push' || github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: image-manifest-${{ matrix.service }}
          path: artifacts/${{ matrix.service }}.json
          if-no-files-found: error

  assemble-manifest:
    name: Assemble release manifest
    runs-on: ubuntu-latest
    needs: [prepare, build-images]
    if: ${{ always() && needs.prepare.result == 'success' && (needs.build-images.result == 'success' || needs.build-images.result == 'skipped') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download manifest fragments
        if: ${{ needs.prepare.outputs.build_services_json != '[]' }}
        uses: actions/download-artifact@v4
        with:
          pattern: image-manifest-*
          path: artifacts
          merge-multiple: true

      - name: Download previous bundle manifest
        if: ${{ needs.prepare.outputs.previous_release_tag != '' }}
        shell: bash
        run: |
          mkdir -p artifacts
          previous_manifest_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ needs.prepare.outputs.previous_release_tag }}/images.json"
          if ! curl -fsSL "$previous_manifest_url" -o artifacts/previous-images.json; then
            echo "Previous bundle manifest not found at $previous_manifest_url; resolving missing services from Docker Hub latest tags." >&2
            rm -f artifacts/previous-images.json
          fi

      - name: Build images.json
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
          REGISTRY: docker.io/${{ env.DOCKERHUB_USERNAME }}
          BUILD_SERVICES_JSON: ${{ needs.prepare.outputs.build_services_json }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';

          const version = process.env.VERSION;
          const releaseTag = process.env.RELEASE_TAG;
          const sourceSha = process.env.SOURCE_SHA;
          const registry = process.env.REGISTRY;
          const buildServices = new Set(JSON.parse(process.env.BUILD_SERVICES_JSON || '[]'));
          const registryNamespace = registry.replace(/^docker\.io\//, '');
          const imageSources = {
            api: { repositoryPath: `${registryNamespace}/cig-api`, reference: 'latest' },
            dashboard: { repositoryPath: `${registryNamespace}/cig-dashboard`, reference: 'latest' },
            'dashboard-selfhosted': { repositoryPath: `${registryNamespace}/cig-dashboard-selfhosted`, reference: 'latest' },
            discovery: { repositoryPath: `${registryNamespace}/cig-discovery`, reference: 'latest' },
            cartography: { repositoryPath: `${registryNamespace}/cig-cartography`, reference: 'latest' },
            chatbot: { repositoryPath: `${registryNamespace}/cig-chatbot`, reference: 'latest' },
            neo4j: { repositoryPath: 'library/neo4j', reference: '5' },
          };
          const dockerHubTokenCache = new Map();

          function walk(dir) {
            if (!fs.existsSync(dir)) {
              return [];
            }

            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                return walk(fullPath);
              }
              return [fullPath];
            });
          }

          async function fetchDockerHubToken(repositoryPath) {
            if (dockerHubTokenCache.has(repositoryPath)) {
              return dockerHubTokenCache.get(repositoryPath);
            }

            const tokenUrl = new URL('https://auth.docker.io/token');
            tokenUrl.searchParams.set('service', 'registry.docker.io');
            tokenUrl.searchParams.set('scope', `repository:${repositoryPath}:pull`);

            const response = await fetch(tokenUrl);
            if (!response.ok) {
              throw new Error(`Failed to request Docker Hub token for ${repositoryPath}: ${response.status} ${response.statusText}`);
            }

            const payload = await response.json();
            const token = payload.token || payload.access_token;

            if (typeof token !== 'string' || token.trim() === '') {
              throw new Error(`Docker Hub did not return an access token for ${repositoryPath}.`);
            }

            dockerHubTokenCache.set(repositoryPath, token);
            return token;
          }

          async function resolveDockerHubDigest(service) {
            const source = imageSources[service];
            if (!source) {
              throw new Error(`Unknown service: ${service}`);
            }

            const { repositoryPath, reference } = source;
            const token = await fetchDockerHubToken(repositoryPath);
            const manifestUrl = `https://registry-1.docker.io/v2/${repositoryPath}/manifests/${reference}`;
            const response = await fetch(manifestUrl, {
              method: 'GET',
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: 'application/vnd.docker.distribution.manifest.v2+json, application/vnd.oci.image.index.v1+json',
              },
            });

            if (!response.ok) {
              throw new Error(`Failed to resolve latest digest for ${repositoryPath}: ${response.status} ${response.statusText}`);
            }

            const digest = response.headers.get('docker-content-digest');
            if (typeof digest !== 'string' || digest.trim() === '') {
              throw new Error(`Docker Hub did not return a digest for ${repositoryPath}:${reference}.`);
            }

            return `docker.io/${repositoryPath}@${digest}`;
          }

          const manifest = {
            version,
            source_tag: releaseTag,
            release_tag: releaseTag,
            source_sha: sourceSha,
            registry,
            images: {},
          };

          const previousManifestPath = path.join('artifacts', 'previous-images.json');
          if (fs.existsSync(previousManifestPath)) {
            const previous = JSON.parse(fs.readFileSync(previousManifestPath, 'utf8'));
            if (previous && typeof previous === 'object' && previous.images && typeof previous.images === 'object') {
              manifest.images = { ...previous.images };
            }
          }

          const fragmentFiles = walk('artifacts').filter(
            (filePath) => filePath.endsWith('.json') && path.basename(filePath) !== 'previous-images.json'
          );

          for (const fragmentFile of fragmentFiles) {
            const fragment = JSON.parse(fs.readFileSync(fragmentFile, 'utf8'));
            if (!fragment || typeof fragment !== 'object' || typeof fragment.service !== 'string' || typeof fragment.image !== 'string') {
              throw new Error(`Invalid image fragment: ${fragmentFile}`);
            }
            manifest.images[fragment.service] = fragment.image;
          }

          const requiredServices = ['api', 'dashboard', 'dashboard-selfhosted', 'discovery', 'cartography', 'chatbot', 'neo4j'];
          for (const service of requiredServices) {
            if (typeof manifest.images[service] !== 'string' || manifest.images[service].trim() === '') {
              manifest.images[service] = await resolveDockerHubDigest(service);
            }
          }

          fs.mkdirSync('dist', { recursive: true });
          fs.writeFileSync(path.join('dist', 'images.json'), JSON.stringify(manifest, null, 2));
          console.log(JSON.stringify(manifest, null, 2));
          NODE

      - name: Upload GitHub release asset
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          files: dist/images.json
          overwrite_files: true
          generate_release_notes: false
          fail_on_unmatched_files: true

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: images-json
          path: dist/images.json
          if-no-files-found: error
