name: Publish @cig-technology/cli

on:
  push:
    tags:
      - "cli-v*.*.*"

  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0). Leave empty to use package.json version."
        required: false
        type: string
      dry_run:
        description: "Dry run — validate without publishing"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint (type-check)
        run: pnpm lint

      - name: Validate package versioning state
        run: pnpm run version:validate

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Smoke test CLI entrypoint
        run: node dist/index.js --help

      - name: Set version from tag (if triggered by tag)
        if: startsWith(github.ref, 'refs/tags/cli-v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/cli-v}"
          echo "Publishing version: $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Set version from input (if manual dispatch)
        if: github.event.inputs.version != ''
        run: |
          echo "Publishing version: ${{ github.event.inputs.version }}"
          npm version "${{ github.event.inputs.version }}" --no-git-tag-version --allow-same-version

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run — skip publish
        if: ${{ inputs.dry_run }}
        run: echo "Dry run complete. Package validated but not published."
