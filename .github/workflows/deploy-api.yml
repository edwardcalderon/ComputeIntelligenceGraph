name: Deploy API -> api.cig.technology

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Existing Docker image tag to deploy (leave blank to promote the current source fingerprint if already published)'
        required: false
        default: ''
      apply_core_data:
        description: 'Run Terraform apply for the API core-data stack'
        type: boolean
        default: true
      dry_run:
        description: 'Resolve the target image and validate inputs without running migrations or deploy'
        type: boolean
        default: false

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
  AUTHENTIK_DOMAIN: ${{ vars.AUTHENTIK_DOMAIN || 'auth.cig.technology' }}
  AUTHENTIK_AWS_REGION: ${{ vars.AUTHENTIK_AWS_REGION || 'us-east-1' }}
  AUTHENTIK_OIDC_APP_SLUG: ${{ vars.AUTHENTIK_OIDC_APP_SLUG || 'cig-dashboard' }}
  API_DOMAIN: ${{ vars.API_DOMAIN || 'api.cig.technology' }}
  API_IMAGE_REPOSITORY: ${{ vars.API_IMAGE_REPOSITORY || 'cig-api-production' }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || 'cigtechnology' }}
  DOCKERHUB_API_IMAGE: ${{ vars.DOCKERHUB_API_IMAGE || 'cig-api' }}
  API_HOSTED_ZONE_DOMAIN: ${{ vars.API_HOSTED_ZONE_DOMAIN || 'cig.technology' }}
  API_CORS_ORIGINS: ${{ vars.CORS_ORIGINS || 'https://app.cig.lat,https://cig.lat' }}
  INFRA_APP_NAME: ${{ vars.INFRA_APP_NAME || 'cig-api' }}
  INFRA_PIPELINE_REPO: ${{ vars.INFRA_PIPELINE_REPO || 'edwardcalderon/ComputeIntelligenceGraph' }}
  INFRA_PIPELINE_PREFIX: ${{ vars.INFRA_PIPELINE_PREFIX || 'cig-api' }}
  INFRA_PROJECT_TAG: ${{ vars.INFRA_PROJECT_TAG || 'cig-api' }}
  INFRA_PIPELINE_BRANCH_PROD: ${{ vars.INFRA_PIPELINE_BRANCH_PROD || 'main' }}
  INFRA_PIPELINE_PERMISSIONS_MODE: ${{ vars.INFRA_PIPELINE_PERMISSIONS_MODE || 'admin' }}
  TF_IN_AUTOMATION: 'true'

jobs:
  detect-api-impact:
    name: Detect API impact
    runs-on: ubuntu-latest
    outputs:
      api_source_changed: ${{ steps.detect.outputs.api_source_changed }}
      api_runtime_changed: ${{ steps.detect.outputs.api_runtime_changed }}
      release_metadata_only: ${{ steps.detect.outputs.release_metadata_only }}
      has_relevant_changes: ${{ steps.detect.outputs.has_relevant_changes }}
      api_source_fingerprint: ${{ steps.detect.outputs.api_source_fingerprint }}
      api_source_tag: ${{ steps.detect.outputs.api_source_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Detect API impact
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BASE="$(git rev-parse "${GITHUB_SHA}^" 2>/dev/null || true)"
            if [[ -z "$BASE" ]]; then
              BASE="$(git hash-object -t tree /dev/null)"
            fi
            node scripts/detect-api-impact.mjs --base "$BASE" --head "$GITHUB_SHA"
          else
            node scripts/detect-api-impact.mjs --head "$GITHUB_SHA"
          fi

  validate:
    name: Validate API deploy inputs
    runs-on: ubuntu-latest
    needs: detect-api-impact
    if: ${{ github.event_name == 'push' && needs.detect-api-impact.outputs.has_relevant_changes == 'true' }}
    permissions:
      contents: read
      id-token: write
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        if: ${{ needs.detect-api-impact.outputs.api_source_changed == 'true' }}
        run: pnpm --filter @cig/graph --filter @cig/sdk --filter @cig/chatbot --filter @cig/discovery --filter @cig/config build

      - name: Lint and test API
        if: ${{ needs.detect-api-impact.outputs.api_source_changed == 'true' }}
        run: |
          pnpm --filter @cig/api lint
          pnpm --filter @cig/api test

      - name: Configure AWS credentials
        if: ${{ needs.detect-api-impact.outputs.api_runtime_changed == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        if: ${{ needs.detect-api-impact.outputs.api_runtime_changed == 'true' }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Prepare Terraform plugin cache
        if: ${{ needs.detect-api-impact.outputs.api_runtime_changed == 'true' }}
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Cache Terraform plugins
        if: ${{ needs.detect-api-impact.outputs.api_runtime_changed == 'true' }}
        uses: actions/cache@v5
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: ${{ runner.os }}-terraform-plugin-${{ hashFiles('packages/iac/environments/api-prod/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-plugin-

      - name: Lint and test infra wrapper
        if: ${{ needs.detect-api-impact.outputs.api_runtime_changed == 'true' }}
        run: |
          pnpm --filter @cig/infra lint
          pnpm --filter @cig/infra test
          pnpm --filter @cig/infra build

      - name: Terraform format check
        if: ${{ needs.detect-api-impact.outputs.api_runtime_changed == 'true' }}
        run: terraform -chdir=packages/iac fmt -check -recursive

      - name: Terraform validate
        if: ${{ needs.detect-api-impact.outputs.api_runtime_changed == 'true' }}
        run: |
          terraform -chdir=packages/iac/environments/api-prod init -backend=false
          terraform -chdir=packages/iac/environments/api-prod validate

      - name: SST diff (bootstrap mode)
        if: ${{ needs.detect-api-impact.outputs.api_runtime_changed == 'true' }}
        working-directory: packages/infra
        env:
          INFRA_API_BOOTSTRAP_ONLY: 'true'
          INFRA_CREATE_PIPELINES: 'false'
          API_IMAGE_URI: public.ecr.aws/docker/library/node:22-alpine
        run: |
          # The first bootstrap has no SST stage yet, so treat that as a soft skip.
          set +e
          OUTPUT=$(pnpm exec sst diff --stage production 2>&1)
          STATUS=$?
          set -e

          if [ "$STATUS" -ne 0 ]; then
            if printf '%s' "$OUTPUT" | grep -q 'Stage not found'; then
              echo 'SST stage not found yet; skipping bootstrap diff.'
              exit 0
            fi

            echo 'SST diff failed; rerun locally for details.' >&2
            exit "$STATUS"
          fi

  build-image:
    name: Resolve or build API image
    runs-on: ubuntu-latest
    needs: [detect-api-impact, validate]
    if: ${{ always() && needs.detect-api-impact.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.detect-api-impact.outputs.has_relevant_changes == 'true') && (needs.validate.result == 'success' || needs.validate.result == 'skipped') }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image_uri: ${{ steps.finalize.outputs.image_uri }}
      image_digest: ${{ steps.finalize.outputs.image_digest }}
      source_tag: ${{ steps.finalize.outputs.source_tag }}
      lookup_tag: ${{ steps.finalize.outputs.lookup_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Resolve repository URI
        id: meta
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REPOSITORY_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${API_IMAGE_REPOSITORY}"
          DOCKERHUB_IMAGE="${DOCKERHUB_USERNAME}/${DOCKERHUB_API_IMAGE}"
          SOURCE_TAG="${{ needs.detect-api-impact.outputs.api_source_tag }}"
          LOOKUP_TAG="$SOURCE_TAG"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.image_tag }}" ]]; then
            LOOKUP_TAG="${{ github.event.inputs.image_tag }}"
          fi

          SHA_TAG="sha-${GITHUB_SHA::7}"
          echo "repository_uri=$REPOSITORY_URI" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=$DOCKERHUB_IMAGE" >> "$GITHUB_OUTPUT"
          echo "source_tag=$SOURCE_TAG" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"
          echo "lookup_tag=$LOOKUP_TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve existing digest
        id: lookup
        shell: bash
        run: |
          set +e
          DIGEST=$(aws ecr describe-images \
            --repository-name "$API_IMAGE_REPOSITORY" \
            --image-ids imageTag="${{ steps.meta.outputs.lookup_tag }}" \
            --query 'imageDetails[0].imageDigest' \
            --output text 2>/dev/null)
          STATUS=$?
          set -e

          if [ "$STATUS" -eq 0 ] && [ -n "$DIGEST" ] && [ "$DIGEST" != "None" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "image_digest=$DIGEST" >> "$GITHUB_OUTPUT"
            echo "image_uri=${{ steps.meta.outputs.repository_uri }}@$DIGEST" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve build policy
        id: policy
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ needs.detect-api-impact.outputs.api_source_changed }}" == "true" ]]; then
            echo "build_allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_allowed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure ECR repository exists
        if: ${{ steps.lookup.outputs.found != 'true' && steps.policy.outputs.build_allowed == 'true' }}
        shell: bash
        run: |
          if ! aws ecr describe-repositories --repository-names "$API_IMAGE_REPOSITORY" >/dev/null 2>&1; then
            aws ecr create-repository \
              --repository-name "$API_IMAGE_REPOSITORY" \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability MUTABLE >/dev/null
          fi

      - name: Login to Amazon ECR
        if: ${{ steps.lookup.outputs.found != 'true' && steps.policy.outputs.build_allowed == 'true' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Docker Hub
        if: ${{ steps.lookup.outputs.found != 'true' && steps.policy.outputs.build_allowed == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ steps.lookup.outputs.found != 'true' && steps.policy.outputs.build_allowed == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        if: ${{ steps.lookup.outputs.found != 'true' && steps.policy.outputs.build_allowed == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            ${{ steps.meta.outputs.repository_uri }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.repository_uri }}:${{ steps.meta.outputs.source_tag }}
            ${{ steps.meta.outputs.dockerhub_image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.dockerhub_image }}:${{ steps.meta.outputs.source_tag }}
          cache-from: |
            type=registry,ref=${{ steps.meta.outputs.repository_uri }}:buildcache
            type=gha
          cache-to: type=registry,ref=${{ steps.meta.outputs.repository_uri }}:buildcache,mode=max
          provenance: false

      - name: Finalize resolved image
        id: finalize
        shell: bash
        run: |
          if [[ "${{ steps.lookup.outputs.found }}" == "true" ]]; then
            echo "image_uri=${{ steps.lookup.outputs.image_uri }}" >> "$GITHUB_OUTPUT"
            echo "image_digest=${{ steps.lookup.outputs.image_digest }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.policy.outputs.build_allowed }}" == "true" ]]; then
            DIGEST="${{ steps.build.outputs.digest }}"
            IMAGE_URI="${{ steps.meta.outputs.repository_uri }}@$DIGEST"
            echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
            echo "image_digest=$DIGEST" >> "$GITHUB_OUTPUT"
          else
            echo "No published image exists for '${{ steps.meta.outputs.lookup_tag }}', and this run is not allowed to build a new one." >&2
            exit 1
          fi

          echo "source_tag=${{ steps.meta.outputs.source_tag }}" >> "$GITHUB_OUTPUT"
          echo "lookup_tag=${{ steps.meta.outputs.lookup_tag }}" >> "$GITHUB_OUTPUT"

      - name: Summarize resolved image
        run: |
          echo "### API image resolution" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lookup tag | \`${{ steps.meta.outputs.lookup_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source tag | \`${{ steps.finalize.outputs.source_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ECR image | \`${{ steps.finalize.outputs.image_uri }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | ${{ steps.lookup.outputs.found == 'true' && 'reused existing digest' || 'built new digest' }} |" >> "$GITHUB_STEP_SUMMARY"

  migrate-db:
    name: Run API migrations against Supabase Postgres
    runs-on: ubuntu-latest
    needs: [detect-api-impact, build-image]
    if: ${{ github.event_name == 'push' && needs.detect-api-impact.outputs.api_source_changed == 'true' && github.event.inputs.dry_run != 'true' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run migrations from the built image
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          IMAGE_URI="${{ needs.build-image.outputs.image_uri }}"
          docker pull "$IMAGE_URI"
          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            "$IMAGE_URI" \
            node dist/migrate.js

  apply-core-data:
    name: Apply API core-data infrastructure
    runs-on: ubuntu-latest
    needs: [detect-api-impact, build-image]
    if: ${{ github.event.inputs.dry_run != 'true' && needs.detect-api-impact.result == 'success' && ((github.event_name == 'workflow_dispatch' && github.event.inputs.apply_core_data != 'false') || (github.event_name == 'push' && needs.detect-api-impact.outputs.api_runtime_changed == 'true')) && needs.build-image.result == 'success' }}
    permissions:
      contents: read
      id-token: write
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Prepare Terraform plugin cache
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Cache Terraform plugins
        uses: actions/cache@v5
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: ${{ runner.os }}-terraform-plugin-${{ hashFiles('packages/iac/environments/api-prod/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-plugin-

      - name: Terraform apply
        run: |
          terraform -chdir=packages/iac/environments/api-prod init
          terraform -chdir=packages/iac/environments/api-prod apply -auto-approve -var-file=prod.tfvars

  deploy-api:
    name: Deploy API runtime to ECS/Fargate
    runs-on: ubuntu-latest
    needs: [build-image, migrate-db, apply-core-data]
    if: ${{ always() && github.event.inputs.dry_run != 'true' && needs.build-image.result == 'success' && (needs.migrate-db.result == 'success' || needs.migrate-db.result == 'skipped') && (needs.apply-core-data.result == 'success' || needs.apply-core-data.result == 'skipped') }}
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
      url: https://${{ env.API_DOMAIN }}
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
      API_SMTP_HOST: ${{ vars.SMTP_HOST || 'mail.xn--tlo-fla.com' }}
      API_SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
      API_SMTP_SECURE: ${{ vars.SMTP_SECURE || 'true' }}
      API_SMTP_AUTH_ENABLED: ${{ vars.SMTP_AUTH_ENABLED || 'true' }}
      API_SMTP_OTP_SUBJECT: ${{ vars.SMTP_OTP_SUBJECT || 'Your CIG one-time code' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Prepare Terraform plugin cache
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Cache Terraform plugins
        uses: actions/cache@v5
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: ${{ runner.os }}-terraform-plugin-${{ hashFiles('packages/iac/environments/api-prod/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-plugin-

      - name: Read API core-data outputs
        env:
          API_CORE_ENV_FILE: ${{ runner.temp }}/api-core.env
        run: |
          terraform -chdir=packages/iac/environments/api-prod init
          terraform -chdir=packages/iac/environments/api-prod output -json > "$RUNNER_TEMP/api-core.json"

          SMTP_FROM_EMAIL_VALUE=$(aws secretsmanager get-secret-value \
            --secret-id "/cig/prod/api/smtp-from-email" \
            --region "$AWS_REGION" \
            --query SecretString \
            --output text)

          {
            echo "API_VPC_ID=$(jq -r '.vpc_id.value' "$RUNNER_TEMP/api-core.json")"
            echo "API_ALB_SECURITY_GROUP_ID=$(jq -r '.alb_security_group_id.value' "$RUNNER_TEMP/api-core.json")"
            echo "API_SECURITY_GROUP_IDS=$(jq -r '.api_service_security_group_id.value' "$RUNNER_TEMP/api-core.json")"
            echo "API_PUBLIC_SUBNET_IDS=$(jq -r '.public_subnet_ids.value | join(",")' "$RUNNER_TEMP/api-core.json")"
            echo "API_PRIVATE_SUBNET_IDS=$(jq -r '.private_subnet_ids.value | join(",")' "$RUNNER_TEMP/api-core.json")"
            echo "API_NEO4J_BOLT_URI=$(jq -r '.neo4j_bolt_uri.value' "$RUNNER_TEMP/api-core.json")"
            echo "API_NEO4J_PASSWORD_SECRET_ARN=$(jq -r '.neo4j_password_secret_arn.value' "$RUNNER_TEMP/api-core.json")"
            printf 'API_SMTP_FROM_EMAIL=%s\n' "$SMTP_FROM_EMAIL_VALUE"
            printf 'API_SMTP_USER=%s\n' "$SMTP_FROM_EMAIL_VALUE"
          } > "$API_CORE_ENV_FILE"

      - name: Resolve Authentik runtime values
        id: authentik
        env:
          AUTHENTIK_RUNTIME_ENV_FILE: ${{ runner.temp }}/authentik-runtime.env
        run: |
          DISCOVERY_URL="https://${AUTHENTIK_DOMAIN}/application/o/${AUTHENTIK_OIDC_APP_SLUG}/.well-known/openid-configuration"
          DISCOVERY_JSON=$(curl --fail --silent --show-error "$DISCOVERY_URL")

          OIDC_CLIENT_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "authentik/${AUTHENTIK_DOMAIN}/oidc-client" \
            --region "$AUTHENTIK_AWS_REGION" \
            --query SecretString \
            --output text)

          {
            printf 'AUTHENTIK_ISSUER_URL=%s\n' "$(jq -r '.issuer' <<<"$DISCOVERY_JSON")"
            printf 'AUTHENTIK_JWKS_URI=%s\n' "$(jq -r '.jwks_uri' <<<"$DISCOVERY_JSON")"
            printf 'AUTHENTIK_TOKEN_ENDPOINT=%s\n' "$(jq -r '.token_endpoint' <<<"$DISCOVERY_JSON")"
            printf 'OIDC_CLIENT_ID=%s\n' "$(jq -r '.client_id' <<<"$OIDC_CLIENT_JSON")"
            printf 'OIDC_CLIENT_SECRET=%s\n' "$(jq -r '.client_secret' <<<"$OIDC_CLIENT_JSON")"
          } > "$AUTHENTIK_RUNTIME_ENV_FILE"

          {
            printf 'issuer_url=%s\n' "$(jq -r '.issuer' <<<"$DISCOVERY_JSON")"
            printf 'jwks_uri=%s\n' "$(jq -r '.jwks_uri' <<<"$DISCOVERY_JSON")"
            printf 'token_endpoint=%s\n' "$(jq -r '.token_endpoint' <<<"$DISCOVERY_JSON")"
            printf 'client_id=%s\n' "$(jq -r '.client_id' <<<"$OIDC_CLIENT_JSON")"
            printf 'client_secret=%s\n' "$(jq -r '.client_secret' <<<"$OIDC_CLIENT_JSON")"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure runtime secrets in AWS Secrets Manager
        env:
          API_CORE_ENV_FILE: ${{ runner.temp }}/api-core.env
          AUTHENTIK_RUNTIME_ENV_FILE: ${{ runner.temp }}/authentik-runtime.env
          API_SECRET_ARNS_FILE: ${{ runner.temp }}/api-secret-arns.env
          SUPABASE_DIRECT_URL_POOLER_VALUE: ${{ secrets.SUPABASE_DIRECT_URL_POOLER }}
          DATABASE_URL_VALUE: ${{ secrets.SUPABASE_DATABASE_URL }}
          SUPABASE_URL_VALUE: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY_VALUE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET_VALUE: ${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY_VALUE: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DATABASE_URL_VALUE="${SUPABASE_DIRECT_URL_POOLER_VALUE:-$DATABASE_URL_VALUE}"

          if [ -z "$DATABASE_URL_VALUE" ]; then
            echo 'Set SUPABASE_DIRECT_URL_POOLER or SUPABASE_DATABASE_URL.' >&2
            exit 1
          fi

          if [[ ! "$DATABASE_URL_VALUE" =~ ^postgres(ql)?:// ]]; then
            echo 'Supabase database URL must be a PostgreSQL connection string.' >&2
            exit 1
          fi

          database_host="${DATABASE_URL_VALUE#*://}"
          database_host="${database_host#*@}"
          database_host="${database_host%%/*}"
          database_host="${database_host%%:*}"

          if [ -z "$database_host" ]; then
            echo 'Supabase database URL must include a host.' >&2
            exit 1
          fi

          case "$database_host" in
            *.supabase.co|*.pooler.supabase.com) ;;
            *)
              echo 'Supabase database URL must point to a Supabase direct or pooler host.' >&2
              exit 1
              ;;
          esac

          if [ -z "$OPENAI_API_KEY_VALUE" ]; then
            echo 'Set the GitHub Actions secret OPENAI_API_KEY before deploying the API runtime.' >&2
            exit 1
          fi

          set -a
          # Keep runtime values out of GITHUB_ENV so GitHub Actions does not print them in step metadata.
          source "$API_CORE_ENV_FILE"
          source "$AUTHENTIK_RUNTIME_ENV_FILE"
          set +a

          : > "$API_SECRET_ARNS_FILE"

          ensure_secret() {
            local secret_name="$1"
            local secret_value="$2"
            local output_var="$3"

            if aws secretsmanager describe-secret --secret-id "$secret_name" >/dev/null 2>&1; then
              aws secretsmanager put-secret-value \
                --secret-id "$secret_name" \
                --secret-string "$secret_value" >/dev/null
              secret_arn=$(aws secretsmanager describe-secret --secret-id "$secret_name" --query ARN --output text)
            else
              secret_arn=$(aws secretsmanager create-secret \
                --name "$secret_name" \
                --secret-string "$secret_value" \
                --query ARN \
                --output text)
            fi

            echo "${output_var}=${secret_arn}" >> "$API_SECRET_ARNS_FILE"
          }

          ensure_secret "/cig/prod/api/database-url" "$DATABASE_URL_VALUE" API_DATABASE_URL_SECRET_ARN
          ensure_secret "/cig/prod/api/supabase-url" "$SUPABASE_URL_VALUE" API_SUPABASE_URL_SECRET_ARN
          ensure_secret "/cig/prod/api/supabase-service-role-key" "$SUPABASE_SERVICE_ROLE_KEY_VALUE" API_SUPABASE_SERVICE_ROLE_KEY_SECRET_ARN
          ensure_secret "/cig/prod/api/jwt-secret" "$JWT_SECRET_VALUE" API_JWT_SECRET_ARN
          ensure_secret "/cig/prod/api/authentik-issuer-url" "$AUTHENTIK_ISSUER_URL" API_AUTHENTIK_ISSUER_URL_SECRET_ARN
          ensure_secret "/cig/prod/api/authentik-jwks-uri" "$AUTHENTIK_JWKS_URI" API_AUTHENTIK_JWKS_URI_SECRET_ARN
          ensure_secret "/cig/prod/api/authentik-token-endpoint" "$AUTHENTIK_TOKEN_ENDPOINT" API_AUTHENTIK_TOKEN_ENDPOINT_SECRET_ARN
          ensure_secret "/cig/prod/api/oidc-client-id" "$OIDC_CLIENT_ID" API_OIDC_CLIENT_ID_SECRET_ARN
          ensure_secret "/cig/prod/api/oidc-client-secret" "$OIDC_CLIENT_SECRET" API_OIDC_CLIENT_SECRET_SECRET_ARN
          ensure_secret "/cig/prod/api/openai-api-key" "$OPENAI_API_KEY_VALUE" API_OPENAI_API_KEY_SECRET_ARN

          SMTP_PASSWORD_SECRET_ARN=$(aws secretsmanager describe-secret \
            --secret-id "/cig/prod/api/smtp-password" \
            --region "$AWS_REGION" \
            --query ARN \
            --output text)

          echo "API_SMTP_PASSWORD_SECRET_ARN=$SMTP_PASSWORD_SECRET_ARN" >> "$API_SECRET_ARNS_FILE"

      - name: Deploy API runtime
        working-directory: packages/infra
        env:
          API_CORE_ENV_FILE: ${{ runner.temp }}/api-core.env
          AUTHENTIK_RUNTIME_ENV_FILE: ${{ runner.temp }}/authentik-runtime.env
          API_SECRET_ARNS_FILE: ${{ runner.temp }}/api-secret-arns.env
          INFRA_CREATE_PIPELINES: 'false'
          INFRA_API_BOOTSTRAP_ONLY: 'false'
          API_IMAGE_URI: ${{ needs.build-image.outputs.image_uri }}
          API_CONTAINER_PORT: '8080'
          API_CPU: '512'
          API_MEMORY_MIB: '1024'
          API_DESIRED_COUNT: '1'
          API_CORS_ORIGINS: ${{ env.API_CORS_ORIGINS }}
          API_HOSTED_ZONE_DOMAIN: ${{ env.API_HOSTED_ZONE_DOMAIN }}
        run: |
          set -a
          source "$API_CORE_ENV_FILE"
          source "$AUTHENTIK_RUNTIME_ENV_FILE"
          source "$API_SECRET_ARNS_FILE"
          set +a

          pnpm exec sst deploy --stage production --yes

  smoke-test:
    name: Smoke test API runtime
    runs-on: ubuntu-latest
    needs: [deploy-api]
    if: ${{ needs.deploy-api.result == 'success' }}
    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Wait for deployment stabilization
        run: sleep 20

      - name: Health check
        run: |
          curl --fail --show-error --silent "https://${API_DOMAIN}/api/v1/health" >/tmp/api-health.json
          cat /tmp/api-health.json

      - name: Generate smoke-test JWT
        id: smoke-jwt
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          TOKEN=$(node - <<'NODE'
          const crypto = require('node:crypto');

          const header = Buffer.from(JSON.stringify({ alg: 'HS256', typ: 'JWT' })).toString('base64url');
          const now = Math.floor(Date.now() / 1000);
          const payload = Buffer.from(
            JSON.stringify({
              sub: 'smoke-test',
              permissions: ['ADMIN'],
              iat: now,
              exp: now + 300,
            })
          ).toString('base64url');
          const signature = crypto
            .createHmac('sha256', process.env.JWT_SECRET)
            .update(`${header}.${payload}`)
            .digest('base64url');

          process.stdout.write(`${header}.${payload}.${signature}`);
          NODE
          )
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Authenticated REST check
        env:
          SMOKE_JWT: ${{ steps.smoke-jwt.outputs.token }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${SMOKE_JWT}" \
            "https://${API_DOMAIN}/api/v1/resources?limit=1" >/tmp/api-resources.json
          cat /tmp/api-resources.json

      - name: GraphQL check
        run: |
          curl --fail --show-error --silent \
            -H "Content-Type: application/json" \
            -d '{"query":"{ __typename }"}' \
            "https://${API_DOMAIN}/graphql" >/tmp/api-graphql.json
          cat /tmp/api-graphql.json

      - name: WebSocket handshake check
        env:
          SMOKE_JWT: ${{ steps.smoke-jwt.outputs.token }}
        run: |
          node - <<'NODE'
          const url = `wss://${process.env.API_DOMAIN}/ws?token=${process.env.SMOKE_JWT}`;
          const ws = new WebSocket(url);

          const timer = setTimeout(() => {
            console.error('WebSocket handshake timed out');
            process.exit(1);
          }, 10000);

          ws.addEventListener('open', () => {
            clearTimeout(timer);
            console.log('WebSocket handshake succeeded');
            ws.close();
          });

          ws.addEventListener('close', () => process.exit(0));
          ws.addEventListener('error', (error) => {
            clearTimeout(timer);
            console.error(error);
            process.exit(1);
          });
          NODE
